  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1e35;
      --blue: #2563eb;
      --blue-light: #dbeafe;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --white: #ffffff;
      --star-on: #f59e0b;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --green-text: #15803d;
      --red-bg: #fff1f2;
      --red-border: #fecdd3;
      --red-text: #be123c;
      --yellow-bg: #fefce8;
      --yellow-border: #fef08a;
      --yellow-text: #854d0e;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }


    .card-logo.logo-dark { background: var(--navy); }
    .empresa-logo.logo-dark { background: var(--navy); }

    /* HEADER */
    header {
      background: var(--navy);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      font-size: 18px;
    }
    .logo svg { width: 28px; height: 28px; }
    .btn-resena {
      background: var(--blue);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-resena:hover { background: #1d4ed8; }

    /* BREADCRUMB */
    .breadcrumb {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 24px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .breadcrumb a { color: var(--blue); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* EMPRESA HEADER */
    .empresa-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px;
      margin-bottom: 24px;
    }
    .empresa-header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
    }
    .empresa-logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .empresa-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .empresa-logo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      background: var(--navy);
      border-radius: 9px;
    }
    .empresa-info { flex: 1; min-width: 200px; }
    .empresa-nombre {
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .empresa-rubro {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      display: inline-block;
      margin-bottom: 14px;
    }
    .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stars { display: flex; gap: 2px; }
    .star { font-size: 20px; }
    .rating-big { font-size: 28px; font-weight: 700; }
    .rating-label { font-size: 13px; color: var(--text-muted); }
    .subcats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .subcat-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      text-align: center;
    }
    .subcat-pill-label { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 2px; }
    .subcat-pill-val { font-weight: 700; font-size: 16px; color: var(--text); }

    /* RESEÑAS */
    .main { max-width: 900px; margin: 0 auto; padding: 0 24px 64px; }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .resena {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .resena-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .resena-stars { display: flex; gap: 2px; }
    .resena-star { font-size: 16px; }
    .resena-rating { font-weight: 700; font-size: 16px; }
    .resena-tiempo {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }
    .badge-sigue {
      font-size: 12px;
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 500;
    }
    .badge-sigue-si {
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      color: var(--green-text);
    }
    .badge-sigue-no {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .resena-subcats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .resena-subcat {
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 7px;
      color: var(--text-muted);
    }
    .resena-subcat span { font-weight: 600; color: var(--text); }

    .resena-publicado {
      font-size: 12px;
      color: var(--text-muted);
      margin: -8px 0 12px;
    }


    /* RESUMEN */
    .resumen {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .resumen-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .resumen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 32px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .resumen-grid { grid-template-columns: 1fr; } }

    .resumen-item { display: flex; flex-direction: column; gap: 6px; }
    .resumen-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    /* Badge cualitativo */
    .badge-cualitativo {
      display: inline-block;
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-cualitativo-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .badge-cualitativo-sub:hover { color: var(--blue); }

    /* Barra numérica */
    .resumen-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .resumen-bar-bg {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .resumen-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .resumen-bar-val { font-size: 13px; font-weight: 700; min-width: 28px; text-align: right; }

    /* Distribución (expandible) */
    .dist-wrap { display: none; margin-top: 10px; }
    .dist-wrap.open { display: block; }
    .dist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
    .dist-row-label { width: 140px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dist-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .dist-bar-fill { height: 100%; background: var(--blue); border-radius: 3px; }
    .dist-count { color: var(--text-muted); min-width: 16px; text-align: right; }

    /* Stats */
    .resumen-stats {
      display: flex;
      gap: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .resumen-stat-item { font-size: 13px; color: var(--text-muted); }
    .resumen-stat-item strong { color: var(--text); }

    /* Highlights */
    .highlights { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .highlights { grid-template-columns: 1fr; } }
    .highlight-card {
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
    }
    .highlight-card-bien { background: var(--green-bg); border: 1px solid var(--green-border); }
    .highlight-card-mal  { background: var(--red-bg);   border: 1px solid var(--red-border); }
    .highlight-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .highlight-card-bien .highlight-label { color: var(--green-text); }
    .highlight-card-mal  .highlight-label { color: var(--red-text); }
    .highlight-text {
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bloque {
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .bloque-bien { background: var(--green-bg); border: 1px solid var(--green-border); }
    .bloque-mal { background: var(--red-bg); border: 1px solid var(--red-border); }
    .bloque-desearias { background: var(--yellow-bg); border: 1px solid var(--yellow-border); }
    .bloque-label {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .bloque-bien .bloque-label { color: var(--green-text); }
    .bloque-mal .bloque-label { color: var(--red-text); }
    .bloque-desearias .bloque-label { color: var(--yellow-text); }
    .bloque-gerencia .bloque-label { color: var(--blue); }
    .bloque-text { color: var(--text); line-height: 1.6; }
    .resena-masked-note { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-style: italic; }
    .resumen-ia-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-style: italic; }

    .resena-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .btn-voto {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .btn-voto:hover:not(.voted) {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-light);
    }
    .btn-voto.voted {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-light);
      cursor: default;
    }
    .btn-voto .voto-count { font-weight: 600; color: var(--text); }
    .btn-voto.voted .voto-count { color: var(--blue); }

    /* NOT FOUND */
    .not-found {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .not-found h2 { font-size: 20px; margin: 12px 0 8px; color: var(--text); }

    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 24px;
      font-size: 13px;
    }
    footer a { color: rgba(255,255,255,0.6); text-decoration: none; }
    footer a:hover { color: white; }

    @media (max-width: 600px) {
      .empresa-header-inner { flex-direction: column; }
      .subcats-row { gap: 6px; }
    }

    /* MODAL DENUNCIA */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-empresa { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .modal label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    .modal textarea, .modal input[type=email] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      margin-bottom: 16px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal textarea:focus, .modal input[type=email]:focus { border-color: var(--blue); }
    .modal textarea { height: 100px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancelar {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-muted);
    }
    .btn-enviar {
      background: var(--blue);
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: background 0.15s;
    }
    .btn-enviar:hover { background: #1d4ed8; }
    .btn-enviar:disabled { opacity: 0.6; cursor: default; }
    .modal-msg { font-size: 13px; margin-top: 12px; text-align: center; }
    .modal-msg.ok { color: var(--green-text); }
    .modal-msg.err { color: var(--red-text); }
    .btn-denunciar {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-denunciar:hover { color: var(--red-text); }
  </style>
</head>

<script>
  const params = new URLSearchParams(window.location.search);
  const empId = params.get('id');

  function stars(rating, size = 20) {
    if (!rating) return '';
    let html = '<div class="stars">';
    for (let i = 1; i <= 5; i++) {
      html += `<span class="star" style="font-size:${size}px">${i <= Math.round(rating) ? '⭐' : '☆'}</span>`;
    }
    html += '</div>';
    return html;
  }

  var ESCALA_OPTIONS = ['Muy malo', 'Malo', 'Bueno', 'Muy bueno'];

  function escalaColor(val) {
    if (val === 'Muy bueno') return 'var(--green-text)';
    if (val === 'Bueno')     return '#16a34a';
    if (val === 'Malo')      return '#ca8a04';
    if (val === 'Muy malo')  return 'var(--red-text)';
    return 'inherit';
  }

  function subcatColor(label, val) {
    if (val === null || val === undefined) return 'inherit';
    if (label === 'Sueldo') return val === 'sobre el mercado' ? 'var(--green-text)' : val === 'bajo el mercado' ? 'var(--red-text)' : '#ca8a04';
    if (label === 'Crecimiento') return val === 'muchas oportunidades' ? 'var(--green-text)' : val === 'pocas oportunidades' ? 'var(--red-text)' : '#ca8a04';
    return escalaColor(val);
  }

  var CARGO_PALABRAS = ['gerente','gerenta','subgerente','director','directora',
    'jefe','jefa','coordinador','coordinadora','supervisor','supervisora',
    'encargado','encargada','líder','lider','analista','desarrollador','desarrolladora',
    'programador','programadora','ingeniero','ingeniera','diseñador','diseñadora',
    'consultor','consultora','especialista','ejecutivo','ejecutiva',
    'ceo','cto','cfo','coo','cmo','ciso','vp','clevel','c-level','c level'];

  function maskCargo(texto) {
    if (!texto) return { text: texto, masked: false };
    // Matches: cargo (including plurals via e?s? suffix) + optional qualifiers + optional words
    var re = new RegExp(
      '\\b(' + CARGO_PALABRAS.join('|') + ')e?s?\\b\\)?(?:\\s+(?:de|del|en|y|sr\\.?|jr\\.?|senior|junior|área|area))*(?:\\s+[A-ZÁÉÍÓÚÑa-záéíóúñ]+){0,3}',
      'gi'
    );
    var masked = false;
    var result = texto.replace(re, function() { masked = true; return '[cargo omitido]'; });
    return { text: result, masked: masked };
  }

  function subcatPill(label, val) {
    if (val === null || val === undefined) return '';
    var color = subcatColor(label, val);
    return `<div class="subcat-pill"><span class="subcat-pill-label">${label}</span><span class="subcat-pill-val" style="color:${color}">${val}</span></div>`;
  }

  function badgeRecomienda(val) {
    if (!val) return '';
    var v = String(val).toLowerCase();
    if (v.startsWith('s')) return `<span class="badge-sigue badge-sigue-si">✓ Lo recomienda para trabajar ahí</span>`;
    if (v.startsWith('d')) return `<span class="badge-sigue" style="background:#fefce8;border:1px solid #fef08a;color:#854d0e;">↔ Su recomendación depende del perfil</span>`;
    return `<span class="badge-sigue badge-sigue-no">No lo recomienda para trabajar ahí</span>`;
  }

  function bloque(tipo, icono, label, texto) {
    if (!texto) return '';
    return `
      <div class="bloque bloque-${tipo}">
        <div class="bloque-label">${icono} ${label}</div>
        <div class="bloque-text">${texto}</div>
      </div>`;
  }

  // localStorage: solo guarda si ESTE usuario ya votó (no el conteo)
  function getVotosLocales() {
    try { return JSON.parse(localStorage.getItem('ei_votos') || '{}'); } catch { return {}; }
  }
  function saveVotosLocales(v) {
    localStorage.setItem('ei_votos', JSON.stringify(v));
  }

  // Carga conteos reales desde Firebase y actualiza los botones en el DOM
  function cargarVotosFirebase(resenas) {
    var ids = resenas.map(function(r) { return r.id; });
    ids.forEach(function(id) {
      db.ref('votos/' + id).on('value', function(snap) {
        var count = snap.val() || 0;
        var btn = document.querySelector('#resena-' + id + ' .btn-voto');
        if (!btn) return;
        var countEl = btn.querySelector('.voto-count');
        countEl.textContent = count > 0 ? count : '';
      });
    });
  }

  var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  function formatFecha(fecha) {
    if (!fecha) return null;
    var parts = fecha.split('-');
    var dia = parseInt(parts[2]);
    var mes = MESES[parseInt(parts[1]) - 1];
    return dia + ' de ' + mes + ' de ' + parts[0];
  }

  function renderResena(r) {
    const votos = getVotosLocales();
    const voted = !!votos[r.id];
    const count = 0; // Firebase actualiza el conteo real via listener

    const resSubcats = [
      { label: 'Sueldo', val: cualitativo(r.sueldo, SUELDO_MAP) },
      { label: 'Crecimiento', val: cualitativo(r.carrera, CARRERA_MAP) },
      { label: 'Flex.', val: r.flexibilidad },
      { label: 'Liderazgo', val: r.liderazgo },
      { label: 'Cultura', val: r.cultura },
    ].filter(c => c.val !== null && c.val !== undefined);

    var queB = maskCargo(r.que_bien);
    var queM = maskCargo(r.que_mal);
    var queD = maskCargo(r.que_desearias);

    return `
      <div class="resena" id="resena-${r.id}">
        <div class="resena-header">
          ${stars(r.cal_general, 16)}
          ${r.cal_general ? `<span class="resena-rating">${r.cal_general}/5</span>` : ''}
          ${r.tiempo ? `<span class="resena-tiempo">${r.tiempo}</span>` : ''}
          ${r.area && r.area !== 'Prefiero no decirlo' ? `<span class="resena-tiempo">${r.area}</span>` : ''}
          ${r.sigue ? (String(r.sigue).toLowerCase().startsWith('s')
            ? `<span class="badge-sigue badge-sigue-si">Sigue trabajando ahí</span>`
            : `<span class="badge-sigue badge-sigue-no">Ya no trabaja ahí</span>`) : ''}
          ${r.recomienda ? badgeRecomienda(r.recomienda) : ''}
        </div>
        ${r.fecha ? `<div class="resena-publicado">Publicado en ${formatFecha(r.fecha)}</div>` : ''}
        ${resSubcats.length ? `<div class="resena-subcats">${resSubcats.map(c => `<div class="resena-subcat">${c.label} <span style="color:${subcatColor(c.label, c.val)};font-weight:700">${c.val}</span></div>`).join('')}</div>` : ''}
        ${bloque('bien', '✅', 'Qué está bien', queB.text)}
        ${bloque('mal', '❌', 'Qué está mal', queM.text)}
        ${bloque('desearias', '💡', 'Qué desearías haber sabido', queD.text)}
        ${bloque('gerencia', '🎯', 'Consejo para la gerencia', r.consejo_gerencia)}
        ${(queB.masked || queM.masked || queD.masked) ? '<div class="resena-masked-note">* Se ocultó una mención de cargo para proteger el anonimato</div>' : ''}
        <div class="resena-footer">
          <button class="btn-denunciar" onclick="abrirDenuncia(${r.id})">⚑ Denunciar</button>
          <button class="btn-voto${voted ? ' voted' : ''}" onclick="votar(${r.id}, this)">
            👍 Yo también lo viví &nbsp;<span class="voto-count">${count > 0 ? count : ''}</span>
          </button>
        </div>
      </div>`;
  }

  function votar(id, btn) {
    const votos = getVotosLocales();
    const ref = db.ref('votos/' + id);
    if (votos[id]) {
      // Quitar voto
      ref.transaction(function(current) { return Math.max((current || 0) - 1, 0); });
      delete votos[id];
      saveVotosLocales(votos);
      btn.classList.remove('voted');
    } else {
      // Agregar voto
      ref.transaction(function(current) { return (current || 0) + 1; });
      votos[id] = true;
      saveVotosLocales(votos);
      btn.classList.add('voted');
    }
  }


  var SUELDO_MAP = {
    1: 'bajo el mercado', 2: 'bajo el mercado',
    3: 'en el mercado',
    4: 'sobre el mercado', 5: 'sobre el mercado'
  };
  var SUELDO_OPTIONS = ['bajo el mercado', 'en el mercado', 'sobre el mercado'];

  var CARRERA_MAP = {
    1: 'pocas oportunidades', 2: 'pocas oportunidades',
    3: 'crecimiento moderado',
    4: 'muchas oportunidades', 5: 'muchas oportunidades'
  };
  var CARRERA_OPTIONS = ['pocas oportunidades', 'crecimiento moderado', 'muchas oportunidades'];

  function cualitativo(val, map) {
    if (!val && val !== 0) return null;
    if (typeof val === 'number') return map[val] || null;
    return val; // ya es texto (respuestas nuevas del form)
  }

  function dominante(arr, options) {
    var counts = {};
    options.forEach(function(o) { counts[o] = 0; });
    arr.forEach(function(v) { if (v && counts[v] !== undefined) counts[v]++; });
    var max = 0, winner = null;
    options.forEach(function(o) { if (counts[o] > max) { max = counts[o]; winner = o; } });
    return { winner: winner, counts: counts, total: arr.filter(Boolean).length };
  }

  function renderDistribucion(id, options, counts, total) {
    var html = '<div class="dist-wrap" id="dist-' + id + '">';
    options.forEach(function(o) {
      var c = counts[o] || 0;
      var pct = total > 0 ? Math.round(c / total * 100) : 0;
      html += '<div class="dist-row">' +
        '<span class="dist-row-label">' + o + '</span>' +
        '<div class="dist-bar-bg"><div class="dist-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<span class="dist-count">' + c + '</span>' +
        '</div>';
    });
    html += '</div>';
    return html;
  }

  function toggleDist(id) {
    var el = document.getElementById('dist-' + id);
    if (el) el.classList.toggle('open');
  }

  function renderResumen(emp) {
    var resenas = emp.resenas || [];

    // Cualitativo
    var sueldoVals = resenas.map(function(r) { return cualitativo(r.sueldo, SUELDO_MAP); });
    var carreraVals = resenas.map(function(r) { return cualitativo(r.carrera, CARRERA_MAP); });
    var sdato = dominante(sueldoVals, SUELDO_OPTIONS);
    var cdato = dominante(carreraVals, CARRERA_OPTIONS);

    // Numérico
    function barHtml(label, val) {
      if (val === null || val === undefined) return '';
      var pct = Math.round(val / 5 * 100);
      return '<div class="resumen-item">' +
        '<span class="resumen-label">' + label + '</span>' +
        '<div class="resumen-bar-wrap">' +
          '<div class="resumen-bar-bg"><div class="resumen-bar-fill" style="width:' + pct + '%"></div></div>' +
          '<span class="resumen-bar-val">' + val + '</span>' +
        '</div></div>';
    }

    function cualHtml(label, dato, distId, options) {
      if (!dato.winner) return '';
      var subtext = dato.total > 1
        ? dato.counts[dato.winner] + ' de ' + dato.total + ' opinan esto'
        : '';
      return '<div class="resumen-item">' +
        '<span class="resumen-label">' + label + '</span>' +
        '<span class="badge-cualitativo">' + dato.winner + '</span>' +
        (subtext ? '<span class="badge-cualitativo-sub" onclick="toggleDist(\'' + distId + '\')">' + subtext + ' ▾</span>' : '') +
        renderDistribucion(distId, options, dato.counts, dato.total) +
        '</div>';
    }

    // Stats
    var total = resenas.length;
    var recSi = resenas.filter(function(r) { return r.recomienda && String(r.recomienda).toLowerCase().startsWith('s'); }).length;
    var recDepende = resenas.filter(function(r) { return r.recomienda && String(r.recomienda).toLowerCase().startsWith('d'); }).length;
    var recNo = resenas.filter(function(r) { return r.recomienda && String(r.recomienda).toLowerCase().startsWith('n'); }).length;
    var totalRec = recSi + recDepende + recNo;
    var sigue = resenas.filter(function(r) {
      return r.sigue && String(r.sigue).toLowerCase().startsWith('s');
    }).length;
    var pctSigue = total > 0 ? Math.round(sigue / total * 100) : null;

    // Highlights: resumen generado por Gemini (campo resumen_bien/mal) o fallback a primera reseña
    var conBien = resenas.filter(function(r) { return r.que_bien; });
    var conMal  = resenas.filter(function(r) { return r.que_mal; });
    var highlightBien = emp.resumen_bien ? maskCargo(emp.resumen_bien).text
                      : conBien.length   ? maskCargo(conBien[0].que_bien).text : null;
    var highlightMal  = emp.resumen_mal  ? maskCargo(emp.resumen_mal).text
                      : conMal.length    ? maskCargo(conMal[0].que_mal).text   : null;

    var gridItems = '';
    var flexVals  = resenas.map(function(r) { return r.flexibilidad; });
    var liVals    = resenas.map(function(r) { return r.liderazgo; });
    var cultVals  = resenas.map(function(r) { return r.cultura; });
    var flexDato  = dominante(flexVals,  ESCALA_OPTIONS);
    var liDato    = dominante(liVals,    ESCALA_OPTIONS);
    var cultDato  = dominante(cultVals,  ESCALA_OPTIONS);

    gridItems += cualHtml('Sueldo', sdato, 'sueldo', SUELDO_OPTIONS);
    gridItems += cualHtml('Crecimiento', cdato, 'carrera', CARRERA_OPTIONS);
    gridItems += cualHtml('Flexibilidad', flexDato, 'flexibilidad', ESCALA_OPTIONS);
    gridItems += cualHtml('Liderazgo', liDato, 'liderazgo', ESCALA_OPTIONS);
    gridItems += cualHtml('Cultura', cultDato, 'cultura', ESCALA_OPTIONS);

    var statsHtml = '';
    if (totalRec > 0) {
      if (recSi > 0)      statsHtml += '<div class="resumen-stat-item"><strong>' + recSi + ' de ' + totalRec + '</strong> lo recomiendan para trabajar ahí</div>';
      if (recDepende > 0) statsHtml += '<div class="resumen-stat-item"><strong>' + recDepende + ' de ' + totalRec + '</strong> ' + (recDepende === 1 ? 'dice' : 'dicen') + ' que su recomendación depende del perfil</div>';
      if (recNo > 0)      statsHtml += '<div class="resumen-stat-item"><strong>' + recNo + ' de ' + totalRec + '</strong> no lo recomiendan para trabajar ahí</div>';
    }
    if (pctSigue !== null) statsHtml += '<div class="resumen-stat-item"><strong>' + pctSigue + '%</strong> sigue trabajando ahí</div>';

    var usaResumenIA = !!(emp.resumen_bien || emp.resumen_mal) && resenas.length > 1;
    var highlightsHtml = '';
    if (highlightBien || highlightMal) {
      var labelBien = usaResumenIA ? '✅ Lo que más valoran*' : '✅ Lo que más valoran';
      var labelMal  = usaResumenIA ? '❌ Principal queja*'    : '❌ Principal queja';
      highlightsHtml = '<div class="highlights">';
      if (highlightBien) highlightsHtml += '<div class="highlight-card highlight-card-bien"><div class="highlight-label">' + labelBien + '</div><div class="highlight-text">' + highlightBien + '</div></div>';
      if (highlightMal)  highlightsHtml += '<div class="highlight-card highlight-card-mal"><div class="highlight-label">' + labelMal  + '</div><div class="highlight-text">' + highlightMal  + '</div></div>';
      highlightsHtml += '</div>';
      if (usaResumenIA) highlightsHtml += '<div class="resumen-ia-note">* Resumen generado con IA a partir de ' + resenas.length + ' reseñas</div>';
    }

    return '<div class="resumen">' +
      '<div class="resumen-title">Resumen</div>' +
      '<div class="resumen-grid">' + gridItems + '</div>' +
      (statsHtml ? '<div class="resumen-stats">' + statsHtml + '</div>' : '') +
      highlightsHtml +
      '</div>';
  }


  var LOGOS_DARK = ['corporacion-3xi','clickie','e-contact','echeverria-izquierdo','isamax','timix-chile'];
  function isDarkLogo(id) { return LOGOS_DARK.indexOf(id) !== -1; }

  fetch('datos.json')
    .then(r => r.json())
    .then(data => {
      const emp = data.find(e => e.id === empId);

      if (!emp) {
        document.getElementById('empresa-header').innerHTML = '';
        document.getElementById('main').innerHTML = `
          <div class="not-found">
            <div style="font-size:48px">🔍</div>
            <h2>Empresa no encontrada</h2>
            <p><a href="index.html" style="color:var(--blue)">← Volver al listado</a></p>
          </div>`;
        return;
      }

      document.title = `${emp.nombre} — Cómo es trabajar ahí | El Interno`;

      // SEO meta tags dinámicos
      const totalRes = emp.total_resenas || 0;
      const prom = emp.promedio ? `Calificación ${emp.promedio}/5. ` : '';
      const metaDesc = `${prom}${totalRes} reseña${totalRes !== 1 ? 's' : ''} anónima${totalRes !== 1 ? 's' : ''} de empleados de ${emp.nombre}. Sueldo, liderazgo, cultura y ambiente laboral. Lo que no aparece en el aviso de trabajo.`;
      const pageUrl = `https://elinterno.com/empresa.html?id=${emp.id}`;
      document.title = `${emp.nombre} — Cómo es trabajar ahí | El Interno`;
      document.querySelector('link[rel="canonical"]').setAttribute('href', pageUrl);
      document.querySelector('meta[name="description"]').setAttribute('content', metaDesc);
      document.querySelector('meta[property="og:title"]').setAttribute('content', `${emp.nombre} — Cómo es trabajar ahí | El Interno`);
      document.querySelector('meta[property="og:description"]').setAttribute('content', metaDesc);
      document.querySelector('meta[property="og:url"]').setAttribute('content', pageUrl);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', `${emp.nombre} — Cómo es trabajar ahí | El Interno`);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', metaDesc);

      // Schema.org JSON-LD dinámico
      const reviews = (emp.resenas || []).filter(r => r.que_bien || r.que_mal);
      const schemaReviews = reviews.slice(0, 5).map(r => ({
        "@type": "Review",
        "reviewRating": {
          "@type": "Rating",
          "ratingValue": r.cal_general,
          "bestRating": "5",
          "worstRating": "1"
        },
        "author": { "@type": "Person", "name": "Empleado anónimo" },
        "reviewBody": [r.que_bien, r.que_mal].filter(Boolean).join(' ').substring(0, 300)
      }));

      const schema = {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": emp.nombre,
        "url": pageUrl,
        "description": metaDesc,
        ...(emp.rubro ? { "industry": emp.rubro } : {}),
        ...(emp.promedio && totalRes ? {
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": emp.promedio,
            "bestRating": "5",
            "worstRating": "1",
            "reviewCount": totalRes
          }
        } : {}),
        ...(schemaReviews.length ? { "review": schemaReviews } : {})
      };

      const schemaTag = document.createElement('script');
      schemaTag.type = 'application/ld+json';
      schemaTag.textContent = JSON.stringify(schema);
      document.head.appendChild(schemaTag);

      // Header
      const logoHtml = emp.logo
        ? `<img src="${emp.logo}" alt="${emp.nombre}" onerror="this.parentElement.innerHTML='<span class=empresa-logo-placeholder>${emp.nombre[0]}</span>'">`
        : `<span class="empresa-logo-placeholder">${emp.nombre[0]}</span>`;

      const subcatsHtml = '';

      document.getElementById('empresa-header').innerHTML = `
        <div class="empresa-header">
          <div class="empresa-header-inner">
            <div class="empresa-logo${isDarkLogo(emp.id) ? ' logo-dark' : ''}">${logoHtml}</div>
            <div class="empresa-info">
              <h1 class="empresa-nombre">${emp.nombre}</h1>
              <span class="empresa-rubro">${emp.rubro || 'Sin rubro'}</span>
              <div class="rating-row">
                ${stars(emp.promedio, 20)}
                ${emp.promedio ? `<span class="rating-big">${emp.promedio}</span>` : ''}
                <span class="rating-label">${emp.total_resenas} reseña${emp.total_resenas !== 1 ? 's' : ''}</span>
              </div>
              ${subcatsHtml ? `<div class="subcats-row">${subcatsHtml}</div>` : ''}
            </div>
          </div>
        </div>`;

      // Reseñas
      const main = document.getElementById('main');
      if (!emp.resenas || !emp.resenas.length) {
        main.innerHTML = '<p style="color:var(--text-muted)">Sin reseñas aún.</p>';
        return;
      }
      const resenasOrdenadas = emp.resenas.slice().sort(function(a, b) {
        var vDiff = (b.votos || 0) - (a.votos || 0);
        if (vDiff !== 0) return vDiff;
        return (b.fecha || '').localeCompare(a.fecha || '');
      });
      main.innerHTML = renderResumen(emp) + `
        <div class="section-title">${emp.total_resenas} reseña${emp.total_resenas !== 1 ? 's' : ''}</div>
        ${resenasOrdenadas.map(renderResena).join('')}`;
      cargarVotosFirebase(resenasOrdenadas);
    });

  var _denunciaResenaId = null;
  var _denunciaEmpresa  = null;

  function abrirDenuncia(resenaId) {
    _denunciaResenaId = resenaId;
    _denunciaEmpresa  = document.querySelector('.empresa-nombre') ? document.querySelector('.empresa-nombre').textContent : empId;
    document.getElementById('modal-empresa-nombre').textContent = _denunciaEmpresa;
    document.getElementById('denuncia-motivo').value = '';
    document.getElementById('denuncia-email').value = '';
    document.getElementById('modal-msg').textContent = '';
    document.getElementById('modal-msg').className = 'modal-msg';
    document.getElementById('btn-enviar-denuncia').disabled = false;
    document.getElementById('modal-denuncia').classList.add('active');
  }

  function cerrarDenuncia() {
    document.getElementById('modal-denuncia').classList.remove('active');
  }

  function enviarDenuncia() {
    var motivo = document.getElementById('denuncia-motivo').value.trim();
    var email  = document.getElementById('denuncia-email').value.trim();
    if (!motivo) {
      document.getElementById('modal-msg').textContent = 'Por favor describe el motivo.';
      document.getElementById('modal-msg').className = 'modal-msg err';
      return;
    }
    if (!email) {
      document.getElementById('modal-msg').textContent = 'Por favor ingresa tu email de contacto.';
      document.getElementById('modal-msg').className = 'modal-msg err';
      return;
    }
    var btn = document.getElementById('btn-enviar-denuncia');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    emailjs.send('service_cdst3m8', 'template_jrblvto', {
      empresa:        _denunciaEmpresa,
      resena_id:      String(_denunciaResenaId),
      motivo:         motivo,
      email_contacto: email
    }).then(function() {
      document.getElementById('modal-msg').textContent = 'Denuncia enviada. La revisaremos pronto.';
      document.getElementById('modal-msg').className = 'modal-msg ok';
      btn.textContent = 'Enviado ✓';
      setTimeout(cerrarDenuncia, 2000);
    }, function() {
      document.getElementById('modal-msg').textContent = 'Error al enviar. Intenta de nuevo.';
      document.getElementById('modal-msg').className = 'modal-msg err';
      btn.disabled = false;
      btn.textContent = 'Enviar denuncia';
    });
  }

  document.getElementById('modal-denuncia').addEventListener('click', function(e) {
    if (e.target === this) cerrarDenuncia();
  });
</script>
